name = "legado-subscription"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# ─── KV 绑定（订阅输出缓存）────────────────────────────────────────
[[kv_namespaces]]
binding = "KV"

# ─── D1 绑定（持久化存储）─────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "legado-subscription"

# ─── 构建（前端 Vite 站点）────────────────────────────────────────
[site]
bucket = "./dist"

[triggers]
crons = [ "*/30 * * * *" ]