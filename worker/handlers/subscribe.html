<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legado 资源中心</title>
    <style>
        :root {
            --primary: #6750A4;
            --on-primary: #ffffff;
            --surface: #fef7ff;
            --surface-container: #f3edf7;
            --outline: #79747e;
            --secondary: #625b71;
            --shadow: rgba(0, 0, 0, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            background: var(--surface);
            color: #1c1b1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-bar {
            width: 100%;
            padding: 20px;
            background: white;
            box-shadow: 0 2px 4px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
            text-align: center;
        }
        h1 { font-size: 1.4rem; color: var(--primary); font-weight: 800; }
        
        .tabs {
            display: flex;
            background: #eee;
            padding: 4px;
            border-radius: 10px;
            margin: 20px 0;
            width: 90%;
            max-width: 400px;
        }
        .tab {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 6px var(--shadow); }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 0 20px 40px;
            display: none;
        }
        .container.active { display: block; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .card h3 { font-size: 1rem; margin-bottom: 15px; color: #555; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-p { background: var(--primary); color: white; }
        .btn-s { background: #EADDFF; color: #21005D; }
        .btn-o { background: #FFD8E4; color: #31111D; }
        .btn-d { background: #FFDAD6; color: #410002; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-top: 10px; }
        .res-item {
            background: var(--surface-container);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .res-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: #444; word-break: break-all; }
        .res-btn {
            font-size: 0.75rem;
            padding: 6px;
            background: white;
            border-radius: 8px;
            color: var(--primary);
            text-decoration: none;
            border: 1px solid var(--primary);
        }

        .preview-container {
            width: 105px;
            margin: 0 auto 10px;
            aspect-ratio: 9/19.5;
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: #0a0a0a;
            padding: 3px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .preview-screen {
            width: 100%;
            height: 100%;
            border-radius: 13px;
            overflow: hidden;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255,255,255,0.2);
            font-size: 10px;
        }
        .preview-container.has-image { background: var(--surface-container); }
        .preview-container.no-image { background: #000; padding: 1.5px; }
        .preview-body {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 6px;
        }

        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding: 12px;
            border-radius: 12px;
            background: #333;
            color: white;
            font-size: 0.85rem;
            display: none;
            z-index: 100;
        }

        /* 注入的 CSS 变量占位符 */
        .preview-inner {
            transform-origin: top left;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 11px;
        }
    </style>
</head>
<body>
    <div class="app-bar">
        <h1>📚 Legado 资源中心</h1>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">订阅整合</div>
        <div class="tab" onclick="switchTab(1)">精选主题</div>
    </div>

    <!-- Tab 0: 订阅整合 -->
    <div id="tab-0" class="container active">
        <div class="card">
            <a href="legado://import/bookSource?src={{SOURCES_URL}}" class="btn btn-p">📦 导入全量整合书源</a>
            <a href="legado://import/replaceRule?src={{RULES_URL}}" class="btn btn-s">✨ 导入全量净化规则</a>
            <a href="legado://import/rssSource?src={{INFO_URL}}" class="btn btn-o">📌 添加到阅读发现</a>
        </div>
        <div class="card">
            <p style="font-size:0.8rem; color:var(--outline); margin-bottom:12px;">高级操作</p>
            <a href="#" onclick="clearAndImport(); return false;" class="btn btn-d">🗑️ 清空并重新订阅</a>
        </div>
    </div>

    <!-- Tab 1: 精选主题 -->
    <div id="tab-1" class="container">
        <div id="res-loading" style="text-align:center; padding:40px; color:var(--outline);">正在从云端获取精选主题...</div>
        <div id="res-content"></div>
    </div>

    <div id="status-bar"></div>

    <script>
        const API_ORIGIN = '{{ORIGIN}}';
        
        window.switchTab = function(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.container').forEach((c, i) => c.classList.toggle('active', i === idx));
            if (idx === 1) loadResources();
        }

        async function loadResources() {
            const container = document.getElementById('res-content');
            if (container.innerHTML !== '') return;

            try {
                const res = await fetch('/api/custom-themes');
                const json = await res.json();
                const items = json.data || [];
                
                if (items.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">暂无精选主题，请先在后台编辑并保存</div>';
                    document.getElementById('res-loading').style.display = 'none';
                    return;
                }

                let html = '<div class="card"><h3>🎨 精选推荐</h3><div class="grid">';
                items.forEach(item => {
                    const exportUrl = API_ORIGIN + '/api/custom-themes/' + item.id + '/export';
                    const importUrl = 'legado://import/readConfig?src=' + encodeURIComponent(exportUrl);
                    
                    html += '<div class="res-item">' +
                            '<div class="preview-container" id="preview-' + item.id + '"></div>' +
                            '<div class="res-name">' + item.name + '</div>' +
                            '<a href="' + importUrl + '" class="res-btn">一键导入</a>' +
                            '</div>';
                });
                html += '</div></div>';

                container.innerHTML = html;
                
                // 渲染预览
                items.forEach(item => {
                    renderThemePreview(item.id, JSON.parse(item.config), item.preview_url);
                });
                document.getElementById('res-loading').style.display = 'none';
            } catch (e) {
                container.innerHTML = '<div style="color:red;padding:20px;">加载失败: ' + e.message + '</div>';
            }
        }

        // --- 以下函数将由 Worker 动态注入字符串形式 ---
        // {{INJECTED_FUNCTIONS}}

        function renderThemePreview(id, config, savedPreviewUrl) {
            const container = document.getElementById('preview-' + id);
            if (!container) return;

            const pUrl = savedPreviewUrl || config.preview_url;
            if (pUrl) {
                container.innerHTML = '<div class="preview-screen">' +
                                      '<img src="' + pUrl + '" loading="lazy">' +
                                      '</div>';
            } else {
                container.innerHTML = '<div class="preview-screen">' +
                                      '<div class="preview-placeholder">' +
                                      '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>' +
                                      '<div style="margin-top:4px">暂无预览</div>' +
                                      '</div></div>';
            }
        }

        function showStatus(msg) {
            const bar = document.getElementById('status-bar');
            bar.textContent = msg;
            bar.style.display = 'block';
            setTimeout(() => bar.style.display = 'none', 3000);
        }

        async function clearAndImport() {
            if (!confirm('将清空本地所有书源并同步云端，确定吗？')) return;
            const port = 1122;
            const base = 'http://127.0.0.1:' + port;
            showStatus('正在尝试连接本地服务...');
            try {
                const res = await fetch(base + '/getBookSources');
                const sources = await res.json();
                const list = Array.isArray(sources) ? sources : (sources.data || []);
                if (list.length > 0) {
                    showStatus('正在删除 ' + list.length + ' 个书源...');
                    await fetch(base + '/deleteBookSources', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(list)
                    });
                }
                showStatus('✅ 已清空，正在拉起导入...');
                const subUrl = API_ORIGIN + '/subscribe/sources';
                setTimeout(() => {
                    location.href = 'legado://import/bookSource?src=' + encodeURIComponent(subUrl);
                }, 1000);
            } catch (e) {
                showStatus('❌ 失败: 请确保阅读 Web 服务已开启 (端口 ' + port + ')');
            }
        }
    </script>
</body>
</html>
