services:
    app:
        image: ghcr.io/318182456/legado-subscription:main
        ports:
            - "3000:3000"
        environment:
            - DATABASE_URL=postgres://postgres:postgres@db:5432/legado
            - REDIS_URL=redis://redis:6379
            - ASSETS_PATH=/app/assets
            - PORT=3000
            - API_SECRET=your_secret_here
        depends_on:
            - db
            - redis
        volumes:
            - ./assets:/app/assets
        restart: always

    db:
        image: postgres:16-alpine
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=legado
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"

    redis:
        image: redis:7-alpine
        volumes:
            - redis_data:/data
        ports:
            - "6379:6379"

volumes:
    postgres_data:
    redis_data:
